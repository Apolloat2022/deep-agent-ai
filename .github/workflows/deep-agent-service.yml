name: deep-agent-core-service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          uv pip install -p .venv \
            -e "deep-agent-core/libs/deepagents[aws]" \
            langgraph \
            langgraph-checkpoint-postgres \
            "psycopg[binary,pool]" \
            fastapi \
            "uvicorn[standard]" \
            httpx \
            python-dotenv \
            pytest \
            pytest-httpx \
            pytest-asyncio \
            ruff

      - name: Lint
        run: .venv/bin/ruff check .

      # Models are served through Amazon Bedrock (see agent.py), so there is
      # no ANTHROPIC_API_KEY. tests/test_hitl_integration.py skips cleanly
      # without resolvable AWS credentials -- this step is a no-op until the
      # OIDC role below exists, at which point it starts exercising the real
      # approve/reject/409 flows against Bedrock in CI.
      - name: Configure AWS credentials
        if: ${{ vars.AWS_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Test
        run: .venv/bin/pytest tests/ -v

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This account has no GitHub Actions OIDC provider yet (confirmed via
      # `aws iam list-open-id-connect-providers` -- empty). role-to-assume is
      # a placeholder until that federation is set up; see HANDOFF.md for
      # what that setup involves and why it wasn't created automatically.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "<REPLACE: OIDC role ARN for GitHub Actions, once the OIDC provider exists>"
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: deep-agent-core-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
