name: deep-agent-core-service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # id-token: write is required for the OIDC step below to mint a token and
    # assume AWS_OIDC_ROLE_ARN. Without it, configure-aws-credentials fails.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          uv pip install -p .venv \
            "deepagents[aws]==0.6.12" \
            langgraph \
            langgraph-checkpoint-postgres \
            "psycopg[binary,pool]" \
            fastapi \
            "uvicorn[standard]" \
            httpx \
            python-dotenv \
            pytest \
            pytest-httpx \
            pytest-asyncio \
            ruff

      - name: Lint
        run: .venv/bin/ruff check .

      # Models are served through Amazon Bedrock (see agent.py), so there is
      # no ANTHROPIC_API_KEY. tests/test_hitl_integration.py skips cleanly
      # without resolvable AWS credentials -- this step is a no-op until the
      # OIDC role below exists, at which point it starts exercising the real
      # approve/reject/409 flows against Bedrock in CI.
      - name: Configure AWS credentials
        if: ${{ vars.AWS_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Test
        run: .venv/bin/pytest tests/ -v

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # id-token: write lets this job assume the OIDC role to push to ECR.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # OIDC federation set up in Session 10: provider
      # token.actions.githubusercontent.com plus the role below, whose trust
      # policy is scoped to repo:Apolloat2022/deep-agent-ai:*. The role grants
      # ECR push (this job) and Bedrock invoke (the test job). See HANDOFF.md.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::924056189531:role/deep-agent-core-github-actions"
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: deep-agent-core-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
