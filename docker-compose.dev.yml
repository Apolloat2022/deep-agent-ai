services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deepagent
      POSTGRES_PASSWORD: deepagent
      POSTGRES_DB: deepagent
    ports:
      - "5432:5432"
    volumes:
      - deepagent_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepagent"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  deepagent_pg_data:
